<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefly Keypress Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0f1d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(26,38,57,0.4) 0%, rgba(10,15,29,1) 80%);
            z-index: 1;
            pointer-events: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .instructions {
            position: absolute;
            z-index: 3;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            pointer-events: none;
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="instructions">PRESS ANY KEY TO SPAWN FIREFLIES</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const fireflies = [];

        
        class Firefly {
            constructor(x, y, key) {
                this.x = x;
                this.y = y;
                this.key = key;
                
                
                this.size = Math.random() * 4 + 3;
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3 - 1; 
                
                
                this.maxLife = Math.random() * 100 + 100; 
                this.life = this.maxLife;
                this.alpha = 1;

                
                const hues = [50, 65, 80, 140]; 
                this.hue = hues[Math.floor(Math.random() * hues.length)];
            }

            update() {
                
                this.speedX += (Math.random() - 0.5) * 0.4;
                this.speedY += (Math.random() - 0.5) * 0.4;

                this.x += this.speedX;
                this.y += this.speedY;
                
                this.life--;
                this.alpha = this.life / this.maxLife;
                
                
                if (this.size > 0.2) this.size -= 0.01;
            }

            draw() {
                ctx.save();
                
                
                ctx.shadowBlur = this.size * 4;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
                
                
                ctx.fillStyle = `hsla(${this.hue}, 100%, 75%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                
                ctx.shadowBlur = 0; 
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.7})`;
                ctx.font = `bold ${this.size * 2.5}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.key, this.x, this.y - (this.size * 2));

                ctx.restore();
            }
        }

        
        window.addEventListener('keydown', (e) => {
            
            if (e.key.length > 2 && e.key !== 'Enter' && e.key !== 'Space') return;

            
            let keyText = e.key;
            if (e.key === ' ') keyText = '␣';
            if (e.key === 'Enter') keyText = '↵';

            
            const randomX = Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1);
            const randomY = Math.random() * (canvas.height * 0.8) + (canvas.height * 0.1);

            
            for(let i = 0; i < 2; i++) {
                fireflies.push(new Firefly(randomX, randomY, keyText));
            }
        });

        
        function animate() {
            
            ctx.fillStyle = 'rgba(10, 15, 29, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = fireflies.length - 1; i >= 0; i--) {
                fireflies[i].update();
                fireflies[i].draw();

                
                if (fireflies[i].life <= 0) {
                    fireflies.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
